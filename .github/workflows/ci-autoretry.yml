name: CI auto-retry

# Self-heals the one CI failure mode we can't prevent: GitHub occasionally fails
# to assign a hosted runner to a queued job and auto-cancels it after ~15 min,
# which marks the whole CI run as "failure" even though nothing ran. See PR #99,
# where `web` sat unscheduled and was cancelled while `server` passed on the same
# config.
#
# Surgical by design — it re-runs ONLY when the non-success jobs were cancelled or
# timed out (the infra signature) and NONE genuinely failed, so a real red test is
# never retried or masked. Capped at run_attempt < 3 (≤ 2 auto-retries) so it can
# never loop. Triggers only on conclusion == failure, so a human cancelling a run
# (conclusion == cancelled) is left alone.

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  actions: write   # required to re-run jobs in the triggering run

jobs:
  retry:
    if: ${{ github.event.workflow_run.conclusion == 'failure' && github.event.workflow_run.run_attempt < 3 }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const run = context.payload.workflow_run;
            core.info(`CI run ${run.id} attempt ${run.run_attempt} concluded: ${run.conclusion}`);

            const jobs = await github.paginate(
              github.rest.actions.listJobsForWorkflowRunAttempt,
              { owner, repo, run_id: run.id, attempt_number: run.run_attempt }
            );

            const infra = jobs.filter(j => ['cancelled', 'timed_out'].includes(j.conclusion));
            const realFailures = jobs.filter(j => j.conclusion === 'failure');

            if (infra.length && !realFailures.length) {
              core.info(`Re-running: ${infra.map(j => j.name).join(', ')} (infra cancel/timeout, no real failures).`);
              await github.rest.actions.reRunWorkflowFailedJobs({ owner, repo, run_id: run.id });
            } else {
              core.info(`No retry — infra=${infra.length}, realFailures=${realFailures.length} (a genuine failure is never auto-retried).`);
            }
